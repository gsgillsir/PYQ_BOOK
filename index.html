<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GS Gill Sir GK/GS PYQ Book Order</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }
        .form-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 550px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .logo {
            display: block;
            margin: 0 auto 15px auto;
            max-width: 100px;
            height: auto;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 { 
            text-align: center; 
            color: #2c3e50; 
            font-weight: 600;
            margin-bottom: 30px;
            font-size: 22px; 
            letter-spacing: 0.5px;
            line-height: 1.4;
        }
        .form-group { 
            margin-bottom: 20px; 
        }
        label { 
            display: block; 
            margin-bottom: 8px; 
            color: #555; 
            font-weight: 500; 
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input[type="text"], input[type="email"], input[type="tel"], input[type="date"], select {
            width: 100%;
            padding: 14px;
            border: 1px solid #dcdde1;
            border-radius: 8px;
            box-sizing: border-box;
            background-color: #fbfbfb;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            color: #333;
            transition: all 0.3s ease;
        }
        input[readonly] {
            background-color: #e9ecef;
            color: #495057;
            cursor: not-allowed;
            font-weight: 600;
        }
        input:focus:not([readonly]), select:focus {
            border-color: #8ec5fc;
            box-shadow: 0 0 0 3px rgba(142, 197, 252, 0.25);
            outline: none;
            background-color: #ffffff;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(to right, #6a11cb 0%, #2575fc 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 117, 252, 0.3);
        }
        .submit-btn { 
            background: linear-gradient(to right, #11998e 0%, #38ef7d 100%); 
        }
        .submit-btn:hover {
            box-shadow: 0 8px 20px rgba(56, 239, 125, 0.3);
        }
        .back-btn { 
            background: transparent;
            color: #7f8c8d;
            border: 1px solid #7f8c8d;
            box-shadow: none;
        }
        .back-btn:hover { 
            background: #f8f9fa;
            color: #2c3e50;
            transform: translateY(0);
            box-shadow: none;
        }
        
        #step2 { display: none; text-align: center; }
        
        /* NEW: Blinking animation for the payment text */
        @keyframes blinker {
            50% { opacity: 0; }
        }

        .pay-amount-text {
            font-size: 32px;
            font-weight: 800;
            /* UPDATED: Red color and blinking animation */
            color: #ff0000;
            animation: blinker 1s linear infinite;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .qr-code { 
            width: 320px; 
            height: 320px; 
            border: 1px solid #eee; 
            border-radius: 12px;
            padding: 15px;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px; 
        }
        
        #success-message {
            display: none; 
            color: #11998e; 
            text-align: center; 
            margin-top: 20px; 
            font-weight: 600;
            padding: 15px;
            background: rgba(17, 153, 142, 0.1);
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="form-container">
    <img src="logo.jpeg" alt="Institute Logo" class="logo">
    
    <h2>GS Gill Sir GK/GS PYQ Book Order</h2>
    
    <form id="bookOrderForm">
        
        <div id="step1">
            <div class="form-group">
                <label>1. Book Name</label>
                <input type="text" name="Book" value="GS Gill Sir GK/GS PYQ Book" readonly required>
            </div>
            <div class="form-group">
                <label>2. Email</label>
                <input type="email" name="Email" required>
            </div>
            <div class="form-group">
                <label>3. Mobile Number</label>
                <input type="tel" name="Mobile" pattern="\d{10}" title="Please enter exactly 10 digits" required>
            </div>
            <div class="form-group">
                <label>4. Full Name</label>
                <input type="text" name="FullName" required>
            </div>
            <div class="form-group">
                <label>5. Father's / Spouse Name</label>
                <input type="text" name="FatherSpouseName" required>
            </div>
            <div class="form-group">
                <label>6. House / Building Details</label>
                <input type="text" name="HouseDetails" required>
            </div>
            <div class="form-group">
                <label>7. Street / Locality</label>
                <input type="text" name="Street" required>
            </div>
            <div class="form-group">
                <label>8. Village / City / Town</label>
                <input type="text" name="City" required>
            </div>
            <div class="form-group">
                <label>9. District</label>
                <input type="text" name="District" required>
            </div>
            <div class="form-group">
                <label>10. Pin Code</label>
                <input type="text" name="PinCode" pattern="\d{6}" maxlength="6" title="Please enter exactly 6 digits" required>
            </div>
            <button type="button" id="nextBtn">Next: Make Payment</button>
        </div>

        <div id="step2">
            <div class="pay-amount-text">Scan to Pay 399</div>
            
            <img src="qr.jpeg" alt="Payment QR Code" class="qr-code">
            
            <div class="form-group" style="text-align: left;">
                <label>Transaction Number</label>
                <input type="text" name="TransactionNumber" placeholder="e.g., UPI Ref No" required>
            </div>
            <div class="form-group" style="text-align: left;">
                <label>Payment Date</label>
                <input type="date" name="PaymentDate" required>
            </div>
            
            <button type="submit" id="submitBtn" class="submit-btn">Submit Order</button>
            <button type="button" id="backBtn" class="back-btn">Back to Details</button>
        </div>

    </form>
    <div id="success-message">Order and Payment Details saved successfully!</div>
</div>

<script>
    // WEB APP URL REMAINS UNCHANGED
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxQp0mfB9AkSdsx0IoM5zMpr41tK14Ie-25XEU6ohjIhtIcWCCpTB28WBd_00MqhBtZgA/exec';
    const form = document.getElementById('bookOrderForm');
    
    // Step navigation elements
    const step1 = document.getElementById('step1');
    const step2 = document.getElementById('step2');
    const nextBtn = document.getElementById('nextBtn');
    const backBtn = document.getElementById('backBtn');
    
    // Submission elements
    const submitBtn = document.getElementById('submitBtn');
    const successMsg = document.getElementById('success-message');

    // Handle "Next" Button logic with validation
    nextBtn.addEventListener('click', () => {
        const inputs = step1.querySelectorAll('input, select');
        let isValid = true;
        
        for (let input of inputs) {
            if (!input.checkValidity()) {
                input.reportValidity(); 
                isValid = false;
                break; 
            }
        }
        
        if (isValid) {
            step1.style.display = 'none';
            step2.style.display = 'block';
        }
    });

    // Handle "Back" Button logic
    backBtn.addEventListener('click', () => {
        step2.style.display = 'none';
        step1.style.display = 'block';
    });

    // Handle Form Submission
    form.addEventListener('submit', e => {
        e.preventDefault(); 
        submitBtn.innerText = "Saving..."; 
        
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                successMsg.style.display = "block"; 
                submitBtn.innerText = "Submit Order"; 
                form.reset(); 
                
                // Keep the default book value after reset
                form.elements["Book"].value = "GS Gill Sir GK/GS PYQ Book";
                
                // Go back to step 1 automatically
                step2.style.display = 'none';
                step1.style.display = 'block';
                
                setTimeout(() => {
                    successMsg.style.display = "none";
                }, 4000);
            })
            .catch(error => {
                console.error('Error!', error.message);
                submitBtn.innerText = "Error! Try Again";
            });
    });
</script>

</body>
</html>
